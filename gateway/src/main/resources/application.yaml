server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/users/**

            - id: shopping-list-service
              uri: http://localhost:8081
              predicates:
                - Path=/shoppings/lists/**
