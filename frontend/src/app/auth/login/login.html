<app-container-wrapper
  navLink="/register"
  navLinkLabel="Nie posiadasz konta?"
  header="Zaloguj się"
  buttonLabel="Zaloguj"
  (submitForm)="onSubmit()"
>
  @for (input of inputs; track input.id) {
    <app-input [label]="input.label" [id]="input.id" [type]="input.type" />
  }
</app-container-wrapper>
