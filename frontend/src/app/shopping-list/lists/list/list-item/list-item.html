<div
  class="group bg-card hover:border-border hover:bg-hover/20 mb-2 flex items-center justify-between rounded-xl border border-transparent p-4 shadow-lg transition-all duration-300"
>
  <div class="flex items-center gap-x-4">
    <div class="relative flex items-center justify-center">
      <input
        type="checkbox"
        [id]="item().name"
        [checked]="item().checked"
        (change)="check()"
        class="peer border-border checked:bg-secondary checked:border-secondary focus:ring-primary focus:ring-offset-bg h-6 w-6 cursor-pointer appearance-none rounded-md border-2 transition-all focus:ring-2 focus:ring-offset-2"
      />
      <svg
        class="text-bg pointer-events-none absolute hidden h-4 w-4 peer-checked:block"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <label [for]="item().name" class="flex cursor-pointer flex-col select-none">
      <span
        [class.line-through]="item().checked"
        [class.text-muted]="item().checked"
        class="text-text text-base font-semibold transition-all duration-300"
      >
        {{ item().name }}
      </span>
    </label>
  </div>

  <div class="flex items-center gap-x-3">
    <div class="bg-bgSoft border-border/30 rounded-lg border px-3 py-1 shadow-inner">
      <span class="text-primary font-mono text-sm font-bold">
        <span class="text-muted mr-0.5 text-xs">x</span>{{ item().quantity }}
      </span>
    </div>

    <button
      class="text-danger hover:bg-danger/10 rounded-full p-2 opacity-0 transition-all group-hover:opacity-100"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
        />
      </svg>
    </button>
  </div>
</div>
