<div class="mx-auto w-full max-w-md">
  <form (ngSubmit)="addParticipant()" class="flex w-full flex-col gap-y-8">
    <div class="flex flex-col gap-y-2">
      <div class="flex items-center gap-x-3">
        <div class="bg-primary h-6 w-1 rounded-full"></div>
        <h2 class="text-text text-2xl font-black tracking-tight">Dodaj Wspólnika</h2>
      </div>
    </div>

    <div class="group relative flex flex-col gap-y-2">
      <app-input
        id="username"
        label="Nazwa użytkownika"
        type="text"
        class="w-full transition-all duration-300"
      />

      <div class="bg-bgMuted h-px w-full overflow-hidden rounded-full">
        <div
          class="bg-primary h-full w-0 transition-all duration-500 ease-out group-focus-within:w-full"
        ></div>
      </div>
    </div>

    <button
      type="submit"
      class="bg-secondary group/btn text-bg shadow-secondary/10 hover:bg-secondary/90 hover:shadow-secondary/25 relative flex w-full items-center justify-center gap-x-3 overflow-hidden rounded-2xl py-5 text-sm font-black tracking-[0.15em] uppercase shadow-lg transition-all active:scale-[0.97]"
    >
      <div
        class="absolute inset-0 -translate-x-full bg-linear-to-r from-transparent via-white/20 to-transparent transition-transform duration-500 group-hover/btn:translate-x-full"
      ></div>

      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5 transition-transform duration-300 group-hover/btn:scale-110 group-hover/btn:rotate-12"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="3"
          d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
        />
      </svg>
      <span>Zaproś do listy</span>
    </button>
  </form>
</div>
