<div class="mx-auto w-full max-w-md">
  <form (ngSubmit)="createList()" class="flex w-full flex-col gap-y-6">
    <div class="flex flex-col gap-y-1">
      <h2 class="text-text text-xl font-bold tracking-tight">Nowa Lista Zakupów</h2>
      <p class="text-muted text-xs font-medium tracking-widest uppercase">
        Nadaj jej unikalną nazwę
      </p>
    </div>

    <div class="group relative flex flex-col gap-y-2">
      <app-input
        id="title"
        label="Nazwa listy"
        type="text"
        class="w-full transition-all duration-300"
      />
      <div
        class="bg-primary/30 h-0.5 w-0 rounded-full transition-all duration-500 group-focus-within:w-full"
      ></div>
    </div>

    <button
      type="submit"
      class="bg-secondary hover:bg-secondary/90 text-bg shadow-secondary/10 hover:shadow-secondary/20 flex w-full items-center justify-center gap-x-2 rounded-2xl py-4 text-sm font-black tracking-widest uppercase shadow-lg transition-all active:scale-[0.98]"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
      </svg>
      Zatwierdź i Stwórz
    </button>
  </form>
</div>
