<div class="bg-bg flex min-h-screen w-full flex-col items-center gap-y-10 py-10">
  <header class="flex flex-col items-center gap-y-4">
    <div class="flex flex-col items-center gap-y-2">
      <h1 class="text-text text-4xl font-black tracking-tight uppercase">
        Moje <span class="text-primary">Listy</span>
      </h1>
      <div class="bg-primary h-1 w-12 rounded-full"></div>
    </div>

    <button
      (click)="toggleModal()"
      class="group/add bg-bgSoft border-border/20 hover:border-primary/50 hover:bg-card flex items-center gap-x-3 rounded-2xl border px-6 py-3 shadow-lg transition-all active:scale-95"
    >
      <div
        class="bg-primary shadow-primary/20 flex h-8 w-8 items-center justify-center rounded-lg shadow-md transition-transform group-hover/add:rotate-90"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="text-bg h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="3"
            d="M12 4v16m8-8H4"
          />
        </svg>
      </div>
      <span class="text-text font-bold tracking-wide">STWÓRZ NOWĄ LISTĘ</span>
    </button>
  </header>

  <ul class="flex w-full max-w-2xl flex-col gap-y-4 px-6">
    @for (list of lists().items; track list.id) {
      <li
        class="group bg-card border-border/10 hover:shadow-primary/5 hover:border-primary/30 relative transform overflow-hidden rounded-2xl border shadow-xl transition-all duration-300 hover:-translate-y-1"
      >
        <div
          class="bg-primary absolute top-0 bottom-0 left-0 w-1 opacity-0 transition-opacity group-hover:opacity-100"
        ></div>

        <div class="p-1">
          <app-list [list]="list" />
        </div>
      </li>
    } @empty {
      <div
        class="bg-bgSoft/50 border-border/20 rounded-3xl border-2 border-dashed p-10 text-center"
      >
        <p class="text-muted text-lg italic">Nie masz jeszcze żadnych list.</p>
        <button class="text-primary mt-2 font-bold hover:underline">
          Kliknij tutaj, aby zacząć
        </button>
      </div>
    }
  </ul>

  @if (isOpen()) {
    <div
      (click)="closeModal()"
      class="bg-bg/80 fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm"
    >
      <div
        (click)="$event.stopPropagation()"
        class="bg-card border-border z-60 w-full max-w-md rounded-2xl border p-6 shadow-2xl shadow-black"
      >
        <app-list-create-form (closeForm)="close()" />
      </div>
    </div>
  }
</div>
